# Shadowrocket 金融API绕过规则

## 自动生成配置

### 方式1: 使用Shadowrocket配置

在Shadowrocket中创建新配置，添加以下规则：

```
[Rule]
# 金融数据API直连
DOMAIN-SUFFIX,eastmoney.com,DIRECT
DOMAIN-SUFFIX,gtimg.cn,DIRECT
DOMAIN-SUFFIX,sina.com.cn,DIRECT
DOMAIN-SUFFIX,sina.cn,DIRECT
DOMAIN-SUFFIX,jrj.com.cn,DIRECT
DOMAIN-SUFFIX,10jqka.com.cn,DIRECT
DOMAIN-SUFFIX,westmoney.com,DIRECT

# 券商API
DOMAIN-SUFFIX,emdata.com,DIRECT
DOMAIN-SUFFIX,tushare.pro,DIRECT

[Host]
localhost = 127.0.0.1

[Proxy]
DIRECT = direct
```

### 方式2: 命令行导入

```bash
# 保存为 shadowrocket.conf
# 然后在Shadowrocket中导入
```

---

## 手动操作步骤

1. 打开 **Shadowrocket**
2. 点击 **配置**
3. 点击 **添加配置** 或选择现有配置
4. 在 **[Rule]** 部分添加：
   ```
   DOMAIN-SUFFIX,eastmoney.com,DIRECT
   DOMAIN-SUFFIX,gtimg.cn,DIRECT
   DOMAIN-SUFFIX,sina.com.cn,DIRECT
   ```
5. 保存并使用新配置

---

## 测试

添加规则后运行：
```bash
python network_helper.py
```

应该能看到：
```
📊 东财实时:
   价格: ¥24.90
   主力: 10000000
```
